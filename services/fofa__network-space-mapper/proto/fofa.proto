syntax = "proto3";

package FOFA;

import "google/protobuf/wrappers.proto";
import "google/protobuf/struct.proto";

option go_package = "miner/grpc-service/FOFA";

service FOFA {
  // Search FOFA network space for assets matching query syntax
  // Use for asset discovery, attack surface enumeration, and vulnerability assessment
  rpc Search(SearchRequest) returns (SearchResponse) {}

  // Get detailed host information from FOFA including ports, services, banners, and certificates
  // Use when investigating a specific IP address for open ports and running services
  rpc GetHost(GetHostRequest) returns (GetHostResponse) {}

  // Get FOFA account information including user stats, VIP level, and API usage quota
  // Use to check account status and available API credits
  rpc GetAccountInfo(GetAccountInfoRequest) returns (GetAccountInfoResponse) {}

  // Get statistical aggregation of FOFA search results - count by protocol, port, country, etc.
  // Use for attack surface analysis and understanding asset distribution
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse) {}
}

// Search request parameters
message SearchRequest {
  string email = 1; // FOFA account email (from secret)
  string key = 2; // FOFA API key (from secret)
  string query = 3; // FOFA search query syntax (e.g. app="Nginx", ip="1.1.1.1", domain="example.com")
  google.protobuf.Int32Value page = 4; // Page number (default 1)
  google.protobuf.Int32Value size = 5; // Results per page (default 100, max 10000)
  string fields = 6; // Comma-separated fields to return (default: host,ip,port,protocol)
  google.protobuf.BoolValue full = 7; // Return full banner information
}

// Search response
message SearchResponse {
  bool error = 1; // Error flag
  string errmsg = 2; // Error message
  // removed: Int64Value size = 3; // Total number of results
  // removed: string next = 4; // Next page token
  repeated SearchResult results = 5; // Search results
}

// Single search result
message SearchResult {
  string host = 1; // Host address
  string ip = 2; // IP address
  string port = 3; // Port number
  string protocol = 4; // Protocol (http/https)
  google.protobuf.Struct raw = 5; // Raw response data from FOFA
}

// Get host request parameters
message GetHostRequest {
  string email = 1; // FOFA account email (from secret)
  string key = 2; // FOFA API key (from secret)
  string host = 3; // IP address or hostname to query
  google.protobuf.BoolValue detail = 4; // Return detailed banner information
}

// Get host response
message GetHostResponse {
  bool error = 1; // Error flag
  string errmsg = 2; // Error message
  google.protobuf.Struct raw = 3; // Raw response data from FOFA
}

// Get account info request (no parameters required)
message GetAccountInfoRequest {
  string email = 1; // FOFA account email (from secret)
  string key = 2; // FOFA API key (from secret)
}

// Get account info response
message GetAccountInfoResponse {
  bool error = 1; // Error flag
  string errmsg = 2; // Error message
  google.protobuf.Struct raw = 3; // Raw response data from FOFA
}

// Get stats request parameters
message GetStatsRequest {
  string email = 1; // FOFA account email (from secret)
  string key = 2; // FOFA API key (from secret)
  string query = 3; // FOFA search query syntax
  string fields = 4; // Comma-separated fields to aggregate by (protocol, port, country, domain, title, os, server, asn, org, region, city, asset_type, fid, icp)
}

// Get stats response
message GetStatsResponse {
  bool error = 1; // Error flag
  string errmsg = 2; // Error message
  google.protobuf.Struct raw = 3; // Raw response data from FOFA
}